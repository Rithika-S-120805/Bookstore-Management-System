<!-- Sidebar Navigation -->
<nav class="col-md-3 col-lg-2 d-md-block bg-light sidebar">
    <div class="position-sticky pt-3">
        {% if user.is_authenticated %}
        <ul class="nav flex-column">
            <li class="nav-item">
                <a class="nav-link {% if request.resolver_match.url_name == 'dashboard' %}active{% endif %}" href="{% url 'dashboard' %}">
                    <i class="bi bi-speedometer2"></i>
                    <span>Dashboard</span>
                </a>
            </li>
            {% if user.is_staff %}
            <li class="nav-item">
                <a class="nav-link {% if 'category' in request.resolver_match.url_name %}active{% endif %}" href="{% url 'category_list' %}">
                    <i class="bi bi-tags"></i>
                    <span>Categories</span>
                </a>
            </li>
            <li class="nav-item">
                <a class="nav-link {% if 'book' in request.resolver_match.url_name %}active{% endif %}" href="{% url 'book_list' %}">
                    <i class="bi bi-book"></i>
                    <span>Books</span>
                </a>
            </li>
            <li class="nav-item">
                <a class="nav-link {% if 'inventory' in request.resolver_match.url_name %}active{% endif %}" href="{% url 'inventory' %}">
                    <i class="bi bi-boxes"></i>
                    <span>Inventory</span>
                </a>
            </li>
            {% endif %}
        </ul>
        <hr class="my-3">
        <div class="px-3 py-2">
            <p class="text-muted small mb-2">Logged in as</p>
            <div class="d-flex align-items-center">
                <div class="rounded-circle bg-primary text-white d-flex align-items-center justify-content-center me-2" style="width: 32px; height: 32px;">
                    <i class="bi bi-person-fill"></i>
                </div>
                <div>
                    <p class="small mb-0 fw-600">{{ user.username }}</p>
                    <p class="small mb-0 text-muted">{% if user.is_staff %}Admin{% else %}User{% endif %}</p>
                </div>
            </div>
        </div>
        {% else %}
        <div class="alert alert-info small text-center mx-2">
            <i class="bi bi-info-circle"></i>
            <p class="mb-2">Please <a href="{% url 'login' %}" class="alert-link">login</a> to access inventory management.</p>
        </div>
        {% endif %}
    </div>
</nav>
