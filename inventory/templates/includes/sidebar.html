<nav class="col-md-3 col-lg-2 d-md-block sidebar">

    <div class="position-sticky d-flex flex-column h-100">

        

        {% if user.is_authenticated %}

        <small class="sidebar-heading">Overview</small>
        <ul class="nav flex-column">
            <li class="nav-item">
                <a class="nav-link sidebar-link {% if request.resolver_match.url_name == 'dashboard' %}active{% endif %}"
                   href="{% url 'dashboard' %}">
                    <i class="bi bi-speedometer2"></i>
                    Dashboard
                </a>
            </li>
        </ul>

        {% if user.is_staff %}

        <small class="sidebar-heading">Business</small>
        <ul class="nav flex-column">

            <li class="nav-item">
                <a class="nav-link sidebar-link {% if 'category' in request.resolver_match.url_name %}active{% endif %}"
                   href="{% url 'category_list' %}">
                    <i class="bi bi-tags-fill"></i>
                    Categories
                </a>
            </li>

            <li class="nav-item">
                <a class="nav-link sidebar-link {% if 'book' in request.resolver_match.url_name %}active{% endif %}"
                   href="{% url 'book_list' %}">
                    <i class="bi bi-book-fill"></i>
                    Books
                </a>
            </li>

            <li class="nav-item">
                <a class="nav-link sidebar-link {% if request.resolver_match.url_name == 'inventory' %}active{% endif %}"
                   href="{% url 'inventory' %}">
                    <i class="bi bi-box-seam-fill"></i>
                    Inventory
                </a>
            </li>

            <li class="nav-item">
                <a class="nav-link sidebar-link {% if request.resolver_match.url_name == 'issue_book' %}active{% endif %}"
                   href="{% url 'issue_book' %}">
                    <i class="bi bi-journal-plus"></i>
                    Issue Book
                </a>
            </li>

        </ul>

        {% else %}

        <small class="sidebar-heading">Library</small>
        <ul class="nav flex-column">
            <li class="nav-item">
                <a class="nav-link sidebar-link {% if 'book' in request.resolver_match.url_name %}active{% endif %}"
                   href="{% url 'book_list' %}">
                    <i class="bi bi-book"></i>
                    Browse Books
                </a>
            </li>
        </ul>

        {% endif %}

        <div class="mt-auto px-3 pb-3">

            <div class="sidebar-user-card px-2 py-2 mb-2 rounded-3 d-flex align-items-center gap-2">
                <div class="rounded-circle bg-primary d-flex align-items-center justify-content-center flex-shrink-0"
                     style="width:34px;height:34px;">
                    <i class="bi bi-person-fill text-white" style="font-size:15px;"></i>
                </div>
                <div class="sidebar-user-name mb-0">{{ user.username }}</div>
            </div>

            <a href="{% url 'logout' %}" class="btn btn-danger w-100 btn-sm">
                <i class="bi bi-box-arrow-right"></i>
                Logout
            </a>
        </div>

        {% else %}

        <div class="text-center p-4">
            <i class="bi bi-person-circle display-4 text-secondary"></i>
            <p class="text-white mt-3">Please login to continue.</p>
            <a href="{% url 'login' %}" class="btn btn-primary">Login</a>
        </div>

        {% endif %}

    </div>

</nav>
