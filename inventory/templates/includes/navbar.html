<nav class="navbar navbar-expand-lg sticky-top">
    <div class="container-fluid px-3 d-flex align-items-center gap-3">

        <!-- Sidebar toggle -->
        <button class="navbar-toggler d-flex align-items-center justify-content-center border-0 flex-shrink-0"
                type="button" id="sidebarToggle" aria-label="Toggle sidebar">
            <i class="bi bi-layout-sidebar"></i>
        </button>

        <!-- Search -->
        <form class="flex-grow-1 mb-0" role="search" action="{% url 'book_list' %}" method="get" style="max-width: 480px;">
            <div class="input-group">
                <span class="input-group-text bg-transparent border-0 pe-0">
                    <i class="bi bi-search text-muted"></i>
                </span>
                <input type="search" name="q" class="form-control border-0 bg-transparent shadow-none"
                       placeholder="Search books, categories, customers...">
            </div>
        </form>

        <div class="collapse navbar-collapse flex-grow-0" id="navbarNav">
            <ul class="navbar-nav ms-auto align-items-lg-center gap-2">

                {% if user.is_authenticated %}

                <!-- Notifications -->
                <li class="nav-item">
                    <a class="nav-link position-relative px-2" href="#" aria-label="Notifications">
                        <i class="bi bi-bell fs-5"></i>
                        <span class="position-absolute top-0 end-0 translate-middle-y bg-danger rounded-circle"
                              style="width:8px;height:8px;"></span>
                    </a>
                </li>

                <!-- Avatar / account -->
                <li class="nav-item dropdown">
                    <a class="nav-link dropdown-toggle d-flex align-items-center gap-2 px-1" href="#"
                       role="button" data-bs-toggle="dropdown" aria-expanded="false">
                        <span class="rounded-circle bg-primary d-flex align-items-center justify-content-center text-white fw-semibold flex-shrink-0"
                              style="width:36px;height:36px;font-size:0.85rem;">
                            {{ user.username|slice:":1"|upper }}
                        </span>
                    </a>
                    <ul class="dropdown-menu dropdown-menu-end shadow-sm">
                        <li class="dropdown-header">
                            <div class="fw-semibold">{{ user.username }}</div>
                            <div class="text-muted small">{% if user.is_staff %}Administrator{% else %}User{% endif %}</div>
                        </li>
                        <li><hr class="dropdown-divider"></li>
                        <li>
                            <form method="post" action="{% url 'logout' %}" class="mb-0">
                                {% csrf_token %}
                                <button type="submit" class="dropdown-item">
                                    <i class="bi bi-box-arrow-right me-2"></i>Logout
                                </button>
                            </form>
                        </li>
                    </ul>
                </li>

                {% else %}

                <li class="nav-item"><a class="nav-link px-3 py-2" href="{% url 'login' %}">Login</a></li>
                <li class="nav-item"><a class="nav-link px-3 py-2" href="{% url 'register' %}">Register</a></li>

                {% endif %}

            </ul>
        </div>

    </div>
</nav>

<div id="sidebarBackdrop" class="sidebar-backdrop"></div>

<script>
    (function () {
        var toggle = document.getElementById('sidebarToggle');
        var sidebar = document.querySelector('.sidebar');
        var backdrop = document.getElementById('sidebarBackdrop');
        if (!toggle || !sidebar) return;

        function close() {
            sidebar.classList.remove('show');
            backdrop.classList.remove('show');
        }

        toggle.addEventListener('click', function () {
            sidebar.classList.toggle('show');
            backdrop.classList.toggle('show');
        });
        backdrop.addEventListener('click', close);
    })();
</script>
