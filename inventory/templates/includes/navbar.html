<!-- Navigation Bar -->
<nav class="navbar navbar-expand-lg sticky-top" style="background: linear-gradient(135deg, #1E3A5F 0%, #142847 100%); box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);">
    <div class="container-fluid">
        <a class="navbar-brand fw-bold" href="{% url 'dashboard' %}" style="font-size: 1.4rem; letter-spacing: 0.5px;">
            <i class="bi bi-book-fill" style="margin-right: 0.5rem;"></i> Bookstore
        </a>
        <button class="navbar-toggler border-0" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav"
            aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav ms-auto">
                {% if user.is_authenticated %}
                <li class="nav-item" style="background-color: white; border-radius: 0.375rem; margin-right: 0.5rem;">
                    <a class="nav-link" href="{% url 'dashboard' %}" style="color: #1E3A5F; font-weight: 600;">
                        <i class="bi bi-speedometer2" style="margin-right: 0.35rem; color: #1E3A5F;"></i> Dashboard
                    </a>
                </li>
                <li class="nav-item" style="background-color: white; border-radius: 0.375rem;">
                    <a class="nav-link dropdown-toggle" href="#" id="userDropdown" role="button" data-bs-toggle="dropdown" aria-expanded="false" style="color: #1E3A5F; font-weight: 600;">
                        <i class="bi bi-person-circle" style="margin-right: 0.35rem; color: #1E3A5F;"></i> {{ user.username }}
                    </a>
                    <ul class="dropdown-menu dropdown-menu-end" aria-labelledby="userDropdown">
                        <li>
                            <form method="post" action="{% url 'logout' %}">
                                {% csrf_token %}
                                <button type="submit" class="dropdown-item">
                                    <i class="bi bi-box-arrow-right"></i> Logout
                                </button>
                            </form>
                        </li>
                    </ul>
                </li>
                {% else %}
                <li class="nav-item">
                    <a class="nav-link" href="{% url 'login' %}">
                        <i class="bi bi-box-arrow-in-right" style="color: white; margin-right: 0.35rem;"></i> Login
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="{% url 'register' %}">
                        <i class="bi bi-person-plus" style="color: white; margin-right: 0.35rem;"></i> Register
                    </a>
                </li>
                {% endif %}
            </ul>
        </div>
    </div>
</nav>
