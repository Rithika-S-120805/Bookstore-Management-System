{% extends 'base.html' %}

{% block title %}Login - Bookstore Inventory{% endblock %}

{% block content %}
<div class="py-5">
    <div class="row justify-content-center">
        <div class="col-lg-5 col-md-7">
            <div class="card">
                <div class="card-header px-4 py-4 text-center">
                    <div class="mb-2"><i class="bi bi-book-half fs-1 text-primary"></i></div>
                    <h2 class="mb-1">Bookstore</h2>
                    <p class="text-muted mb-0">Inventory Management System</p>
                </div>
                <div class="card-body p-4">
                    <form method="post" novalidate>
                        {% csrf_token %}
                        {% if form.non_field_errors %}<div class="alert alert-danger">{{ form.non_field_errors }}</div>{% endif %}
                        <div class="mb-3"><label class="form-label" for="id_username">Username</label><input type="text" class="form-control" id="id_username" name="username" autofocus required></div>
                        <div class="mb-3"><label class="form-label" for="id_password">Password</label><input type="password" class="form-control" id="id_password" name="password" required></div>
                        <button type="submit" class="btn btn-primary w-100">Login</button>
                    </form>
                    <p class="text-center text-muted mt-4 mb-0">Don't have an account? <a href="{% url 'register' %}">Register here</a></p>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
