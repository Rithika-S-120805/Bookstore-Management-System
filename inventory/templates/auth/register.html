{% extends 'base.html' %}

{% block title %}Register - Bookstore Inventory{% endblock %}

{% block content %}
<div class="py-5">
    <div class="row justify-content-center">
        <div class="col-lg-5 col-md-7">
            <div class="card">
                <div class="card-header px-4 py-4 text-center">
                    <div class="mb-2"><i class="bi bi-person-plus fs-1 text-success"></i></div>
                    <h2 class="mb-1">Create Account</h2>
                    <p class="text-muted mb-0">Join the bookstore system</p>
                </div>
                <div class="card-body p-4">
                    <form method="post" novalidate>
                        {% csrf_token %}
                        <div class="mb-3"><label class="form-label" for="username">Username</label><input type="text" class="form-control" id="username" name="username" autofocus required></div>
                        <div class="mb-3"><label class="form-label" for="email">Email</label><input type="email" class="form-control" id="email" name="email" required></div>
                        <div class="mb-3"><label class="form-label" for="password">Password</label><input type="password" class="form-control" id="password" name="password" required></div>
                        <div class="mb-3"><label class="form-label" for="password_confirm">Confirm Password</label><input type="password" class="form-control" id="password_confirm" name="password_confirm" required></div>
                        <button type="submit" class="btn btn-success w-100">Register</button>
                    </form>
                    <p class="text-center text-muted mt-4 mb-0">Already have an account? <a href="{% url 'login' %}">Login here</a></p>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
